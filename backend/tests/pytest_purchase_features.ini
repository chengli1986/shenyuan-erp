[pytest]
# 申购单功能测试配置文件
# 用于配置最近开发的申购单相关功能的测试运行参数

# 测试发现模式
testpaths = 
    tests/unit/test_purchase_validation.py
    tests/unit/test_system_category_intelligence.py
    tests/unit/test_remaining_quantity_calculation.py
    tests/unit/test_batch_operations.py
    tests/unit/test_workflow_approval.py
    tests/integration/test_purchase_workflow_integration.py
    tests/integration/test_purchase_ui_backend_integration.py

# Python文件模式
python_files = test_purchase_*.py test_*_purchase.py

# 测试函数模式
python_functions = test_*

# 测试类模式  
python_classes = Test*

# 标记定义
markers =
    unit: 单元测试标记
    integration: 集成测试标记
    purchase: 申购单相关测试标记
    validation: 数据验证测试标记
    workflow: 工作流测试标记
    permission: 权限测试标记
    ui_backend: 前后端集成测试标记
    slow: 运行较慢的测试
    critical: 关键功能测试

# 输出选项
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    -ra

# 最小版本要求
minversion = 6.0

# 测试目录
testmon_noselect = True

# 过滤警告
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 并发配置（如果需要）
# 注意：申购单测试涉及状态变更，建议串行运行确保数据一致性
# addopts = -n auto  # 如需并行运行，可取消注释